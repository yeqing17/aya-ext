name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: ubuntu-latest
            artifact: linux

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - uses: actions/setup-node@v4
      with:
        node-version: '18.x'
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
    - if: matrix.os == 'ubuntu'
      run: |
        sudo apt-get install --no-install-recommends -y icnsutils graphicsmagick xz-utils
    - run: |
        npm i
        npm run adb
        npm run server
        npm run scrcpy
        npm run build
        npm run pack
    - uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: |
          release/**/*.exe
          release/**/*.AppImage
          !release/**/win-unpacked/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: List artifacts
      run: find artifacts -type f | head -20
    - uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/**/*.exe
          artifacts/**/*.AppImage
        generate_release_notes: true
